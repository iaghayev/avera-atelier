<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avera Atelier — Timeless Elegance</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito+Sans:wght@200;300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2c2826; --accent: #c4727e; --white: #ffffff; --bg: #faf8f4;
  --shadow-lg: 0 20px 50px rgba(0,0,0,0.15);
  --heading: 'Playfair Display', serif; --body: 'Nunito Sans', sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--primary); font-family: var(--body); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

/* NAV & LANG */
.lang-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 2001; background: var(--primary); padding: 8px 3rem; display: flex; justify-content: flex-end; gap: 15px; }
.lang-btn { background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
.lang-btn.active { color: #fff; border-bottom: 1.5px solid var(--accent); }

nav { position: fixed; top: 35px; left: 0; width: 100%; z-index: 2000; padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; transition: 0.4s; }
nav.scrolled { background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); padding: 1rem 3rem; box-shadow: 0 2px 30px rgba(0,0,0,0.04); }
.logo { font-family: var(--heading); font-size: 1.8rem; font-style: italic; color: var(--primary); text-decoration: none; }

/* HERO */
.hero { height: 100vh; display: flex; align-items: center; justify-content: center; background: #f4efe6; text-align: center; }
.hero-title { font-family: var(--heading); font-size: clamp(3rem, 10vw, 8.5rem); font-style: italic; margin-bottom: 0.5rem; opacity: 0; animation: fadeUp 1s forwards 0.5s; }
.hero-sub { font-size: 1.1rem; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); opacity: 0; animation: fadeUp 1s forwards 0.8s; }

/* GRID */
section { padding: 8rem 3rem; }
.dynamic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 3rem; max-width: 1300px; margin: 0 auto; }
.item-card { background: var(--white); cursor: pointer; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 2px; overflow: hidden; }
.item-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
.item-img { width: 100%; aspect-ratio: 3/4; background-size: cover; background-position: center; transition: 0.8s; }
.item-card:hover .item-img { transform: scale(1.05); }
.item-info { padding: 1.5rem; text-align: center; }

/* MODAL SYSTEM */
.pm-overlay { position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.4s; }
.pm-overlay.active { display: flex; opacity: 1; }
.pm-container { background: var(--white); width: 95%; max-width: 1200px; height: 85vh; display: flex; border-radius: 4px; overflow: hidden; position: relative; }

.pm-slider { flex: 1.3; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
.pm-main-img { width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; transition: 0.4s; }

.slider-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; width: 60px; height: 60px; color: #fff; font-size: 2rem; cursor: pointer; transition: 0.3s; z-index: 10; display: flex; align-items: center; justify-content: center; }
.slider-nav:hover { background: rgba(255,255,255,0.3); }
.prev-btn { left: 0; } .next-btn { right: 0; }

.pm-content { flex: 1; padding: 4rem; overflow-y: auto; }
.pm-close { position: absolute; top: 20px; right: 20px; z-index: 20; background: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; }
.pm-price { font-size: 1.5rem; color: var(--accent); margin: 1.5rem 0; font-weight: 700; }
.pm-desc { font-family: 'Lora', serif; line-height: 1.8; color: #666; margin-bottom: 2.5rem; font-size: 1.1rem; }

.pm-footer-btn { display: block; width: 100%; padding: 1.2rem; background: var(--primary); color: #fff; text-align: center; text-decoration: none; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 900px) { .pm-container { flex-direction: column; } .pm-slider { height: 50%; } .pm-content { padding: 2rem; } }
</style>
</head>
<body>

<div class="preloader" id="preloader"><div class="preloader-logo">Avera</div></div>

<div class="lang-bar">
  <button class="lang-btn active" onclick="switchLang('az')">AZ</button>
  <button class="lang-btn" onclick="switchLang('ru')">RU</button>
  <button class="lang-btn" onclick="switchLang('en')">EN</button>
</div>

<nav id="nav"><a href="#" class="logo">Avera</a></nav>

<section class="hero">
  <div class="hero-content">
    <h1 class="hero-title" id="hero-title">Avera Atelier</h1>
    <p class="hero-sub" id="hero-sub">Fashion & Style</p>
  </div>
</section>

<section id="about" style="text-align:center;">
  <div class="reveal">
    <p class="section-label">Haqqımızda</p>
    <h2 class="section-title" id="about-title">Zamansız Zəriflik</h2>
    <div id="about-text" class="pm-desc" style="max-width:800px; margin:0 auto;"></div>
  </div>
</section>

<section id="products">
  <div class="dynamic-grid" id="grid"></div>
</section>

<div class="pm-overlay" id="pm">
  <div class="pm-container">
    <button class="pm-close" onclick="closePm()">&times;</button>
    <div class="pm-slider">
      <button class="slider-nav prev-btn" onclick="slide(-1)">&#10094;</button>
      <div class="pm-main-img" id="pmImg"></div>
      <button class="slider-nav next-btn" onclick="slide(1)">&#10095;</button>
    </div>
    <div class="pm-content">
      <h2 id="pmTitle" style="font-family:var(--heading); font-size:2.5rem;"></h2>
      <div id="pmPrice" class="pm-price"></div>
      <p id="pmDesc" class="pm-desc"></p>
      <button class="pm-footer-btn" onclick="order()" id="orderBtn"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supa = supabase.createClient('https://ijljnzqigtfonvqlkhkr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqbGpuenFpZ3Rmb252cWxraGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjY5NzAsImV4cCI6MjA5MDcwMjk3MH0.KDnvL1F-Zwae5fyEzEyGNAT7QYT0L7KKy1g84LQTLDU');

let state = { products: [], lang: 'az', wa: '', activeP: null, imgIdx: 0 };

const dict = {
  az: { order: "WhatsApp ilə Sifariş", msg: "Salam, bu məhsul haqqında məlumat istəyirəm: " },
  ru: { order: "Заказать через WhatsApp", msg: "Здравствуйте, я хочу заказать: " },
  en: { order: "Order via WhatsApp", msg: "Hello, I'm interested in: " }
};

// --- DATA LOADER ---
async function boot() {
  const { data: settings } = await supa.from('app_settings').select('*').eq('id', 1).single();
  if(settings) {
    state.wa = settings.whatsapp;
    document.getElementById('hero-title').textContent = settings.hero_title || 'Avera';
    document.getElementById('hero-sub').textContent = settings.hero_sub || 'Fashion';
    document.getElementById('about-title').textContent = settings.about_title || '';
    document.getElementById('about-text').textContent = settings.about_text || '';
  }

  const { data: prods } = await supa.from('products').select('*').eq('status', 'active');
  state.products = prods || [];
  renderGrid();
  document.getElementById('preloader').style.display='none';
}

function renderGrid() {
  const container = document.getElementById('grid');
  container.innerHTML = state.products.map(p => `
    <div class="item-card" onclick="openPm('${p.id}')">
      <div class="item-img" style="background-image:url('${p.images?.[0] || ''}')"></div>
      <div class="item-info">
        <h3 style="font-family:var(--heading)">${safeTxt(p.name)}</h3>
        <p style="color:var(--accent); font-weight:700; margin-top:5px;">${p.price} ₼</p>
      </div>
    </div>
  `).join('');
}

// --- MODAL & SLIDER ---
function openPm(id) {
  state.activeP = state.products.find(x => x.id === id);
  state.imgIdx = 0;
  updatePm();
  document.getElementById('pm').classList.add('active');
  document.body.style.overflow='hidden';
}

function updatePm() {
  const p = state.activeP;
  document.getElementById('pmTitle').textContent = safeTxt(p.name);
  document.getElementById('pmPrice').textContent = p.price + " ₼";
  document.getElementById('pmDesc').textContent = safeTxt(p.description);
  document.getElementById('pmImg').style.backgroundImage = `url('${p.images[state.imgIdx]}')`;
  document.getElementById('orderBtn').textContent = dict[state.lang].order;
  
  const arrows = document.querySelectorAll('.slider-nav');
  arrows.forEach(a => a.style.display = p.images.length > 1 ? 'flex' : 'none');
}

function slide(dir) {
  const len = state.activeP.images.length;
  state.imgIdx = (state.imgIdx + dir + len) % len;
  document.getElementById('pmImg').style.backgroundImage = `url('${state.activeP.images[state.imgIdx]}')`;
}

// --- LOGIC ---
function safeTxt(obj) {
  if(!obj) return '';
  if(typeof obj === 'string') return obj;
  return obj[state.lang] || obj.az || obj.en || '';
}

function switchLang(l) {
  state.lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === l));
  renderGrid();
  if(state.activeP) updatePm();
}

function closePm() { document.getElementById('pm').classList.remove('active'); document.body.style.overflow=''; }

function order() {
  const url = `https://wa.me/${state.wa}?text=${encodeURIComponent(dict[state.lang].msg + safeTxt(state.activeP.name))}`;
  window.open(url, '_blank');
}

window.addEventListener('load', boot);
window.addEventListener('scroll', () => document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50));
</script>
</body>
</html>
