<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avera Atelier — Fashion & Style</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital@0;1&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --cream: #f4efe6; --warm-white: #faf8f4; --charcoal: #2c2826;
  --taupe: #8a7e74; --rose: #c4727e; --shadow-md: 0 8px 40px rgba(0,0,0,0.1);
  --heading: 'Playfair Display', serif; --body: 'Nunito Sans', sans-serif;
}
body { background: var(--warm-white); color: var(--charcoal); font-family: var(--body); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

/* ═══ NAV & LANG ═══ */
.lang-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 2001; background: var(--charcoal); padding: 5px 3rem; display: flex; justify-content: flex-end; gap: 10px; }
.lang-btn { background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; transition: 0.3s; }
.lang-btn.active { color: #fff; border-bottom: 1px solid var(--rose); }

nav { position: fixed; top: 25px; left: 0; width: 100%; z-index: 2000; padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; transition: 0.4s; }
nav.scrolled { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 1rem 3rem; box-shadow: 0 2px 20px rgba(0,0,0,0.05); }
.nav-logo { font-family: var(--heading); font-size: 1.6rem; font-style: italic; text-decoration: none; color: var(--charcoal); }

/* ═══ HERO ═══ */
.hero { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--cream); text-align: center; }
.hero-brand { font-family: var(--heading); font-size: clamp(3rem, 10vw, 8rem); font-style: italic; margin-bottom: 1rem; }

/* ═══ GRID ═══ */
section { padding: 5rem 3rem; }
.dynamic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; max-width: 1200px; margin: 0 auto; }
.product-card { background: #fff; cursor: pointer; transition: 0.4s; border-radius: 4px; overflow: hidden; }
.product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
.product-img { width: 100%; aspect-ratio: 3/4; background-size: cover; background-position: center; }
.product-info { padding: 1.2rem; text-align: center; }

/* ═══ MODAL & SLIDER ═══ */
.pm-overlay { position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
.pm-overlay.active { display: flex; opacity: 1; }
.pm-modal { background: #fff; width: 95%; max-width: 1000px; height: 80vh; display: flex; position: relative; border-radius: 4px; overflow: hidden; }
.pm-close { position: absolute; top: 15px; right: 15px; z-index: 10; background: #fff; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }

.pm-gallery { flex: 1.2; position: relative; background: #000; display: flex; align-items: center; }
.pm-main-img { width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; }

/* Slider Oxları */
.nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); color: #fff; border: none; width: 45px; height: 45px; cursor: pointer; font-size: 1.5rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
.nav-arrow:hover { background: rgba(255,255,255,0.4); }
.arrow-left { left: 10px; }
.arrow-right { right: 10px; }

.pm-details { flex: 1; padding: 3rem; overflow-y: auto; }
.pm-title { font-family: var(--heading); font-size: 2rem; margin-bottom: 10px; }
.pm-price { font-size: 1.3rem; color: var(--rose); margin-bottom: 20px; font-weight: 600; }
.pm-btn { display: block; width: 100%; padding: 1rem; background: var(--charcoal); color: #fff; text-align: center; text-decoration: none; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; margin-top: 2rem; }

@media (max-width: 800px) { .pm-modal { flex-direction: column; } .pm-gallery { height: 45%; } }
</style>
</head>
<body>

<div class="lang-bar">
  <button class="lang-btn active" onclick="switchLang('az')">AZ</button>
  <button class="lang-btn" onclick="switchLang('ru')">RU</button>
  <button class="lang-btn" onclick="switchLang('en')">EN</button>
</div>

<nav id="nav"><a href="#" class="nav-logo">Avera</a></nav>

<section class="hero">
  <div class="hero-content">
    <h1 class="hero-brand" id="ui-hero-title">Avera Atelier</h1>
    <p class="hero-sub" id="ui-hero-sub">Fashion & Style</p>
  </div>
</section>

<section id="products">
  <div class="dynamic-grid" id="productGrid"></div>
</section>

<div class="pm-overlay" id="productModal">
  <div class="pm-modal">
    <button class="pm-close" onclick="closeProductModal()">&times;</button>
    <div class="pm-gallery">
      <button class="nav-arrow arrow-left" onclick="changeImg(-1)">&#10094;</button>
      <div class="pm-main-img" id="mainImg"></div>
      <button class="nav-arrow arrow-right" onclick="changeImg(1)">&#10095;</button>
    </div>
    <div class="pm-details">
      <h2 class="pm-title" id="mTitle">Məhsul</h2>
      <div class="pm-price" id="mPrice">0 ₼</div>
      <p class="pm-desc" id="mDesc"></p>
      <div id="mMeta" style="margin-top:20px; font-size:0.9rem; border-top:1px solid #eee; padding-top:20px;"></div>
      <button class="pm-btn" onclick="orderWA()" id="mBtn">Sifariş üçün Əlaqə</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supa = supabase.createClient('https://ijljnzqigtfonvqlkhkr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqbGpuenFpZ3Rmb252cWxraGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjY5NzAsImV4cCI6MjA5MDcwMjk3MH0.KDnvL1F-Zwae5fyEzEyGNAT7QYT0L7KKy1g84LQTLDU');

let products = [], currentLang = 'az', waNum = '', currentP = null, imgIdx = 0;

const t = {
  az: { order: "Sifariş üçün Əlaqə", msg: "Salam, mən bu məhsulla maraqlanıram: " },
  ru: { order: "Связаться для заказа", msg: "Здравствуйте, меня интересует этот товар: " },
  en: { order: "Contact to Order", msg: "Hello, I am interested in this product: " }
};

async function loadData() {
  const { data: settings } = await supa.from('app_settings').select('*').eq('id', 1).single();
  if(settings) {
    waNum = settings.whatsapp;
    if(settings.hero_title) document.getElementById('ui-hero-title').textContent = settings.hero_title;
  }

  const { data: prods } = await supa.from('products').select('*').eq('status', 'active');
  products = prods || [];
  render();
}

function render() {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = products.map(p => `
    <div class="product-card" onclick="openModal('${p.id}')">
      <div class="product-img" style="background-image:url('${p.images?.[0]||''}')"></div>
      <div class="product-info">
        <h3>${p.name[currentLang] || p.name.az}</h3>
        <p>${p.price} ₼</p>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  currentP = products.find(x => x.id === id);
  imgIdx = 0;
  updateModal();
  document.getElementById('productModal').classList.add('active');
}

function updateModal() {
  const p = currentP;
  document.getElementById('mTitle').textContent = p.name[currentLang] || p.name.az;
  document.getElementById('mPrice').textContent = p.price + " ₼";
  document.getElementById('mDesc').textContent = p.description[currentLang] || p.description.az;
  document.getElementById('mainImg').style.backgroundImage = `url('${p.images[imgIdx]}')`;
  document.getElementById('mBtn').textContent = t[currentLang].order;
  
  // Oxların görünməsi
  document.querySelectorAll('.nav-arrow').forEach(a => a.style.display = p.images.length > 1 ? 'flex' : 'none');
}

function changeImg(dir) {
  imgIdx = (imgIdx + dir + currentP.images.length) % currentP.images.length;
  document.getElementById('mainImg').style.backgroundImage = `url('${currentP.images[imgIdx]}')`;
}

function switchLang(l) {
  currentLang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === l));
  render();
  if(currentP) updateModal();
}

function closeProductModal() { document.getElementById('productModal').classList.remove('active'); }

function orderWA() {
  const link = `https://wa.me/${waNum}?text=${encodeURIComponent(t[currentLang].msg + (currentP.name[currentLang] || currentP.name.az))}`;
  window.open(link, '_blank');
}

window.addEventListener('load', loadData);
window.addEventListener('scroll', () => document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50));
</script>
</body>
</html>
