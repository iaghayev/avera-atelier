<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avera Atelier — Enterprise Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1a1a1a; --accent: #c4727e; --bg: #f4efe6; --white: #ffffff;
  --text: #3d3835; --muted: #8a7e74; --border: #e8e0d2; --radius: 8px;
  --sidebar-w: 260px; --shadow: 0 4px 20px rgba(0,0,0,0.06);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Nunito Sans', sans-serif; display: flex; min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* AUTH */
.auth-overlay { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
.auth-overlay.hidden { display: none; }
.auth-card { background: var(--white); padding: 3rem; border-radius: var(--radius); box-shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center; }

/* SIDEBAR */
.sidebar { width: var(--sidebar-w); background: var(--primary); color: #fff; padding: 1.5rem 0; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
.sidebar-header { padding: 0 1.5rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.08); font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; text-align:center;}
.nav-group { padding: 1rem 0; flex: 1; overflow-y: auto; }
.nav-label { padding: 0.5rem 1.5rem; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.3); margin-top: 0.5rem; }
.nav-item { padding: 0.7rem 1.5rem; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.6); border: none; background: none; width: 100%; text-align: left; font-size: 0.85rem; }
.nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: #fff; border-left: 3px solid var(--accent); }

/* MAIN */
.main-content { flex: 1; margin-left: var(--sidebar-w); padding: 2rem; width: calc(100% - var(--sidebar-w));}
.header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: var(--white); padding: 1rem 2rem; border-radius: var(--radius); box-shadow: var(--shadow); }
.page { display: none; animation: fadeIn 0.4s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* UI ELEMENTS */
.card { background: var(--white); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; overflow-x: auto; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; font-family: 'Playfair Display', serif; font-size:1.2rem;}
.btn { padding: 0.7rem 1.2rem; border-radius: 5px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; font-family: inherit; font-size: 0.8rem; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--accent); }
.btn-outline { background: transparent; border: 1.5px solid var(--border); }
.btn-danger { background: #fee2e2; color: #dc2626; }
.btn-sm { padding: 0.4rem 0.8rem; font-size: 0.7rem; }

/* DATA TABLE */
table { width: 100%; border-collapse: collapse; white-space: nowrap; }
th { text-align: left; padding: 1rem; font-size: 0.7rem; text-transform: uppercase; color: var(--muted); border-bottom: 2px solid var(--border); }
td { padding: 1rem; border-bottom: 1px solid var(--bg); vertical-align: middle; }
.data-img { width: 45px; height: 60px; object-fit: cover; border-radius: 4px; background: var(--bg); }

/* FORMS */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
.form-group { margin-bottom: 1.2rem; }
.label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--muted); text-transform: uppercase; }
.input, .textarea, .select { width: 100%; padding: 0.8rem; border: 1.5px solid var(--border); border-radius: 6px; outline: none; font-family: var(--body); }

.form-tabs { display: flex; gap: 5px; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); }
.form-tab { padding: 0.5rem 1.5rem; background: none; border: none; cursor: pointer; font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; }
.form-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.lang-content, .cms-lang-content { display: none; }
.lang-content.active, .cms-lang-content.active { display: block; animation: fadeIn 0.3s; }

/* IMAGE PREVIEWER */
.image-upload-box { border: 2px dashed var(--border); padding: 2rem; text-align: center; border-radius: 6px; cursor: pointer; position: relative; background: #fafafa; }
.image-upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.preview-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1rem; }
.preview-box { width: 80px; height: 100px; position: relative; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
.preview-box img { width: 100%; height: 100%; object-fit: cover; }

.modal-wrap { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; }
.modal-wrap.active { display: flex; }
.modal-content { background: var(--white); width: 95%; max-width: 850px; max-height: 90vh; overflow-y: auto; border-radius: var(--radius); }
.modal-header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-body { padding: 2rem; }
.modal-footer { padding: 1.5rem 2rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; background: #fafafa; }

.toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--primary); color: #fff; padding: 1rem 2rem; border-radius: 5px; transform: translateY(100px); transition: 0.3s; z-index: 9999; }
.toast.show { transform: translateY(0); }
</style>
</head>
<body>

<div class="auth-overlay" id="authScreen">
  <div class="auth-card">
    <h1 style="font-family:var(--heading); font-style:italic; margin-bottom:1.5rem;">Avera Admin</h1>
    <input type="password" id="adminPass" class="input" placeholder="Şifrə" style="text-align:center; margin-bottom:1rem;">
    <button class="btn btn-primary" style="width:100%" onclick="login()">Sistemə Daxil Ol</button>
  </div>
</div>

<aside class="sidebar">
  <div class="sidebar-header">Avera Atelier</div>
  <nav class="nav-group">
    <div class="nav-label">Kataloq</div>
    <button class="nav-item active" onclick="navTo('products', this)">Məhsullar</button>
    <button class="nav-item" onclick="navTo('collections', this)">Kolleksiyalar</button>
    <div class="nav-label">Sayt İdarəetməsi (CMS)</div>
    <button class="nav-item" onclick="navTo('cms-site', this)">Dizayn və Mətnlər</button>
    <div class="nav-label">Ayarlar</div>
    <button class="nav-item" onclick="navTo('settings', this)">Sistem & Əlaqə</button>
  </nav>
</aside>

<main class="main-content">
  <div class="header-bar">
    <h2 id="pageTitle" style="font-family:var(--heading)">Məhsullar</h2>
    <span id="liveClock" style="font-weight:600; color:var(--muted)"></span>
  </div>

  <div class="page active" id="page-products">
    <div class="card">
      <div class="card-header"><span>Bütün Məhsullar (<span id="stProd">0</span>)</span> <button class="btn btn-primary" onclick="openProductModal()">+ Yeni Məhsul</button></div>
      <div id="productsTableContainer"></div>
    </div>
  </div>

  <div class="page" id="page-collections">
    <div class="card">
      <div class="card-header"><span>Kolleksiyalar</span> <button class="btn btn-primary" onclick="openCollModal()">+ Yeni Kolleksiya</button></div>
      <div id="collectionsTableContainer"></div>
    </div>
  </div>

  <div class="page" id="page-cms-site">
    <div class="card">
      <div class="card-header"><span>Saytın Dizaynı və Mətnləri</span></div>
      
      <div class="form-group">
        <label class="label">Ana Səhifə Arxa Fon Şəkli (Hero Background)</label>
        <div class="image-upload-box">
          <p>Yeni fon şəkli yükləmək üçün bura klikləyin</p>
          <input type="file" accept="image/*" onchange="uploadHeroBg(event)">
        </div>
        <img id="heroBgPreview" style="width:100%; height:200px; object-fit:cover; border-radius:6px; margin-top:10px; display:none;">
      </div>

      <div class="form-tabs">
        <button class="form-tab active" onclick="switchCmsTab('az', this)">AZ</button>
        <button class="form-tab" onclick="switchCmsTab('ru', this)">RU</button>
        <button class="form-tab" onclick="switchCmsTab('en', this)">EN</button>
      </div>

      <div class="cms-lang-content active" id="cms-lang-az">
        <div class="form-group"><label class="label">Ən Üst Qara Panel Mətni (Top Bar)</label><input class="input" id="cms_top_az"></div>
        <div class="form-grid">
          <div class="form-group"><label class="label">Menyu Linki 1 (Məs: Yeni Gələnlər)</label><input class="input" id="cms_nav1_az"></div>
          <div class="form-group"><label class="label">Menyu Linki 2 (Məs: Geyimlər)</label><input class="input" id="cms_nav2_az"></div>
        </div>
        <div class="form-grid">
          <div class="form-group"><label class="label">Hero Alt Başlıq (Eyebrow)</label><input class="input" id="cms_sub_az"></div>
          <div class="form-group"><label class="label">Hero Böyük Başlıq (Title)</label><input class="input" id="cms_title_az"></div>
        </div>
        <div class="form-group"><label class="label">Hero Düymə Mətni</label><input class="input" id="cms_btn_az"></div>
      </div>

      <div class="cms-lang-content" id="cms-lang-ru">
        <div class="form-group"><label class="label">Top Bar (RU)</label><input class="input" id="cms_top_ru"></div>
        <div class="form-grid">
          <div class="form-group"><label class="label">Menyu Linki 1 (RU)</label><input class="input" id="cms_nav1_ru"></div>
          <div class="form-group"><label class="label">Menyu Linki 2 (RU)</label><input class="input" id="cms_nav2_ru"></div>
        </div>
        <div class="form-grid">
          <div class="form-group"><label class="label">Hero Alt Başlıq (RU)</label><input class="input" id="cms_sub_ru"></div>
          <div class="form-group"><label class="label">Hero Böyük Başlıq (RU)</label><input class="input" id="cms_title_ru"></div>
        </div>
        <div class="form-group"><label class="label">Hero Düymə (RU)</label><input class="input" id="cms_btn_ru"></div>
      </div>

      <div class="cms-lang-content" id="cms-lang-en">
        <div class="form-group"><label class="label">Top Bar (EN)</label><input class="input" id="cms_top_en"></div>
        <div class="form-grid">
          <div class="form-group"><label class="label">Menyu Linki 1 (EN)</label><input class="input" id="cms_nav1_en"></div>
          <div class="form-group"><label class="label">Menyu Linki 2 (EN)</label><input class="input" id="cms_nav2_en"></div>
        </div>
        <div class="form-grid">
          <div class="form-group"><label class="label">Hero Alt Başlıq (EN)</label><input class="input" id="cms_sub_en"></div>
          <div class="form-group"><label class="label">Hero Böyük Başlıq (EN)</label><input class="input" id="cms_title_en"></div>
        </div>
        <div class="form-group"><label class="label">Hero Düymə (EN)</label><input class="input" id="cms_btn_en"></div>
      </div>

      <button class="btn btn-primary" onclick="saveCMS()" style="margin-top:1rem;">Bütün Dizaynı Yadda Saxla</button>
    </div>
  </div>

  <div class="page" id="page-settings">
    <div class="card">
      <div class="card-header"><span>Sistem və Əlaqə</span></div>
      <div class="form-grid">
        <div class="form-group"><label class="label">Əlaqə Nömrəsi (Üst paneldə görünəcək)</label><input class="input" id="setPhone" placeholder="+994 55 123 45 67"></div>
        <div class="form-group"><label class="label">Instagram Adı (Üst paneldə görünəcək)</label><input class="input" id="setInsta" placeholder="@avera_atelier"></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="label">WhatsApp Nömrəsi (Sifariş üçün: Rəqəmlərlə)</label><input class="input" id="setWa" placeholder="994551234567"></div>
        <div class="form-group"><label class="label">Admin Şifrəsi</label><input type="password" class="input" id="setPass" placeholder="Yeni şifrə"></div>
      </div>
      <button class="btn btn-primary" onclick="saveSettings()">Yenilə</button>
    </div>
  </div>
</main>

<div class="modal-wrap" id="productModal">
  <div class="modal-content">
    <div class="modal-header"><h3 id="mTitle" style="font-family:var(--heading)">Məhsul</h3><button onclick="closeModal('productModal')" class="btn-outline" style="border:none;font-size:1.5rem;">&times;</button></div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label class="label">Şəkillər</label>
        <div class="image-upload-box"><input type="file" multiple accept="image/*" onchange="processUploads(event)"></div>
        <div class="preview-grid" id="previewGrid"></div>
      </div>
      <div class="form-grid"><div class="form-group"><label class="label">Brend</label><input class="input" id="pBrand"></div><div class="form-group"><label class="label">Etiket (Badge)</label><input class="input" id="pTags"></div></div>
      <div class="form-tabs"><button class="form-tab active" onclick="switchTab('az', this)">AZ</button><button class="form-tab" onclick="switchTab('ru', this)">RU</button><button class="form-tab" onclick="switchTab('en', this)">EN</button></div>
      <div class="lang-content active" id="lang-az"><div class="form-group"><label class="label">Ad</label><input class="input" id="pNameAZ"></div></div>
      <div class="lang-content" id="lang-ru"><div class="form-group"><label class="label">Ad</label><input class="input" id="pNameRU"></div></div>
      <div class="lang-content" id="lang-en"><div class="form-group"><label class="label">Ad</label><input class="input" id="pNameEN"></div></div>
      <div class="form-grid"><div class="form-group"><label class="label">Kirayə</label><input class="input" id="pRentPrice"></div><div class="form-group"><label class="label">RRP</label><input class="input" id="pPrice"></div></div>
      <div class="form-grid"><div class="form-group"><label class="label">Kolleksiya</label><select class="select" id="pColl"></select></div><div class="form-group"><label class="label">Ölçülər</label><input class="input" id="pSizes"></div></div>
    </div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="commitProduct()">Yadda Saxla</button></div>
  </div>
</div>

<div class="modal-wrap" id="collModal">
  <div class="modal-content" style="max-width:500px;">
    <div class="modal-header"><h3 style="font-family:var(--heading)">Kolleksiya</h3><button onclick="closeModal('collModal')" class="btn-outline" style="border:none;font-size:1.5rem;">&times;</button></div>
    <div class="modal-body">
      <input type="hidden" id="editCollId">
      <div class="form-tabs"><button class="form-tab active" onclick="switchCollTab('az', this)">AZ</button><button class="form-tab" onclick="switchCollTab('ru', this)">RU</button><button class="form-tab" onclick="switchCollTab('en', this)">EN</button></div>
      <div class="lang-content-coll active" id="clang-az"><div class="form-group"><label class="label">Ad (AZ)</label><input class="input" id="cNameAZ"></div></div>
      <div class="lang-content-coll" id="clang-ru"><div class="form-group"><label class="label">Ad (RU)</label><input class="input" id="cNameRU"></div></div>
      <div class="lang-content-coll" id="clang-en"><div class="form-group"><label class="label">Ad (EN)</label><input class="input" id="cNameEN"></div></div>
    </div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="commitCollection()">Yadda Saxla</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supa = supabase.createClient('https://ijljnzqigtfonvqlkhkr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqbGpuenFpZ3Rmb252cWxraGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjY5NzAsImV4cCI6MjA5MDcwMjk3MH0.KDnvL1F-Zwae5fyEzEyGNAT7QYT0L7KKy1g84LQTLDU');
const CLOUD_URL = 'https://api.cloudinary.com/v1_1/dxigokm01/image/upload'; const CLOUD_PRESET = 'avera_preset';

let state = { products: [], collections: [], images: [], heroBg: '' };

function login() {
  const p = document.getElementById('adminPass').value;
  if(p === (localStorage.getItem('avera_secure_p') || 'avera2026')) { document.getElementById('authScreen').classList.add('hidden'); init(); }
  else alert('Yanlış şifrə');
}

async function init() {
  setInterval(() => document.getElementById('liveClock').textContent = new Date().toLocaleTimeString('az-AZ'), 1000);
  await loadCollections(); await loadProducts(); await loadCMS();
}

function navTo(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active')); btn.classList.add('active'); document.getElementById('pageTitle').textContent = btn.textContent;
}

// --- CMS & SETTINGS ---
async function loadCMS() {
  const {data} = await supa.from('app_settings').select('*').eq('id', 1).single();
  if(data) {
    document.getElementById('setWa').value = data.whatsapp || '';
    document.getElementById('setInsta').value = data.instagram || '';
    document.getElementById('setPhone').value = data.phone || '';
    
    if(data.hero_bg) {
      state.heroBg = data.hero_bg;
      document.getElementById('heroBgPreview').src = data.hero_bg;
      document.getElementById('heroBgPreview').style.display = 'block';
    }

    const setLangData = (field, dbField) => {
      document.getElementById(`cms_${field}_az`).value = data[dbField]?.az || '';
      document.getElementById(`cms_${field}_ru`).value = data[dbField]?.ru || '';
      document.getElementById(`cms_${field}_en`).value = data[dbField]?.en || '';
    };

    setLangData('top', 'topbar_text');
    setLangData('nav1', 'nav_link_1');
    setLangData('nav2', 'nav_link_2');
    setLangData('sub', 'hero_sub');
    setLangData('title', 'hero_title');
    setLangData('btn', 'hero_btn');
  }
}

async function uploadHeroBg(e) {
  const file = e.target.files[0]; if(!file) return; notify('Arxa fon yüklənir...');
  const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', CLOUD_PRESET);
  const r = await fetch(CLOUD_URL, {method:'POST', body:fd}); const d = await r.json();
  if(d.secure_url) { state.heroBg = d.secure_url; document.getElementById('heroBgPreview').src = d.secure_url; document.getElementById('heroBgPreview').style.display = 'block'; notify('Fon yükləndi!'); }
}

async function saveCMS() {
  const getLangData = (field) => ({
    az: document.getElementById(`cms_${field}_az`).value || document.getElementById(`cms_${field}_az`).value,
    ru: document.getElementById(`cms_${field}_ru`).value || document.getElementById(`cms_${field}_az`).value,
    en: document.getElementById(`cms_${field}_en`).value || document.getElementById(`cms_${field}_az`).value
  });

  await supa.from('app_settings').upsert({
    id: 1, hero_bg: state.heroBg,
    topbar_text: getLangData('top'), nav_link_1: getLangData('nav1'), nav_link_2: getLangData('nav2'),
    hero_sub: getLangData('sub'), hero_title: getLangData('title'), hero_btn: getLangData('btn')
  });
  notify('Dizayn məlumatları yeniləndi!');
}

async function saveSettings() {
  const p = document.getElementById('setPass').value; if(p) localStorage.setItem('avera_secure_p', p);
  await supa.from('app_settings').upsert({ id: 1, phone: document.getElementById('setPhone').value, instagram: document.getElementById('setInsta').value, whatsapp: document.getElementById('setWa').value.replace(/[^0-9]/g, '') });
  notify('Ayarlar saxlanıldı');
}

// Omitted redundant CRUD JS functions for brevity (They are exactly same as previous version)
async function loadCollections() { const {data} = await supa.from('collections').select('*'); state.collections = data||[]; document.getElementById('pColl').innerHTML = `<option value="">-- Kolleksiya --</option>` + state.collections.map(c=>`<option value="${c.id}">${c.name.az}</option>`).join(''); document.getElementById('collectionsTableContainer').innerHTML = `<table><tbody>`+state.collections.map(c=>`<tr><td>${c.name.az}</td><td><button onclick="delColl('${c.id}')">Sil</button></td></tr>`).join('')+`</tbody></table>`; }
async function loadProducts() { const {data} = await supa.from('products').select('*'); state.products = data||[]; document.getElementById('stProd').textContent = state.products.length; document.getElementById('productsTableContainer').innerHTML = `<table><tbody>`+state.products.map(p=>`<tr><td><img src="${p.images?.[0]||''}" class="data-img"></td><td>${p.name.az}</td><td><button onclick="delProd('${p.id}')">Sil</button></td></tr>`).join('')+`</tbody></table>`; }
async function processUploads(e) { const files = Array.from(e.target.files); for(let f of files) { const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', CLOUD_PRESET); const r = await fetch(CLOUD_URL, {method:'POST', body:fd}); const d = await r.json(); if(d.secure_url) state.images.push(d.secure_url); } renderPreviews(); }
function renderPreviews() { document.getElementById('previewGrid').innerHTML = state.images.map((img,i)=>`<div class="preview-box"><img src="${img}"></div>`).join(''); }
function switchTab(l,b) { document.querySelectorAll('.form-tab').forEach(t=>t.classList.remove('active')); b.classList.add('active'); document.querySelectorAll('.lang-content').forEach(c=>c.classList.remove('active')); document.getElementById(`lang-${l}`).classList.add('active'); }
function switchCmsTab(l,b) { document.querySelectorAll('.form-tab').forEach(t=>t.classList.remove('active')); b.classList.add('active'); document.querySelectorAll('.cms-lang-content').forEach(c=>c.classList.remove('active')); document.getElementById(`cms-lang-${l}`).classList.add('active'); }
function openModal(id) { document.getElementById(id).classList.add('active'); } function closeModal(id) { document.getElementById(id).classList.remove('active'); } function notify(m) { const t = document.getElementById('toast'); t.textContent = m; t.className = 'toast show'; setTimeout(()=>t.className='toast', 3000); }
function openProductModal() { state.images=[]; renderPreviews(); openModal('productModal'); }
async function commitProduct() { const azN=document.getElementById('pNameAZ').value; const p = {name:{az:azN,ru:document.getElementById('pNameRU').value||azN,en:document.getElementById('pNameEN').value||azN}, price:parseFloat(document.getElementById('pPrice').value)||0, rental_price:parseFloat(document.getElementById('pRentPrice').value)||0, collection_id:document.getElementById('pColl').value||null, images:state.images, status:'active', brand:document.getElementById('pBrand').value, tags:document.getElementById('pTags').value}; await supa.from('products').insert([p]); closeModal('productModal'); loadProducts(); }
async function delProd(id) { await supa.from('products').delete().eq('id',id); loadProducts(); }
async function commitCollection() { const azN=document.getElementById('cNameAZ').value; await supa.from('collections').insert([{name:{az:azN,ru:azN,en:azN},status:'active'}]); closeModal('collModal'); loadCollections(); }
async function delColl(id) { await supa.from('collections').delete().eq('id',id); loadCollections(); }
function switchCollTab(l,b) { document.querySelectorAll('#collModal .form-tab').forEach(t=>t.classList.remove('active')); b.classList.add('active'); document.querySelectorAll('.lang-content-coll').forEach(c=>c.classList.remove('active')); document.getElementById(`clang-${l}`).classList.add('active'); }
function openCollModal() { openModal('collModal'); }
</script>
