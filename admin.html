<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avera Atelier — Senior Admin Control</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2c2826; --accent: #c4727e; --bg: #f7f4ef; --white: #ffffff;
  --text: #3d3835; --muted: #8a7e74; --border: #e8e0d2; --radius: 10px;
  --sidebar-w: 260px; --shadow: 0 4px 20px rgba(0,0,0,0.08);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Nunito Sans', sans-serif; display: flex; min-height: 100vh; }

/* AUTH SCREEN */
.auth-overlay { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
.auth-overlay.hidden { display: none; }
.auth-card { background: var(--white); padding: 3rem; border-radius: var(--radius); shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center; }

/* SIDEBAR */
.sidebar { width: var(--sidebar-w); background: var(--primary); color: #fff; padding: 2rem 0; display: flex; flex-direction: column; position: fixed; height: 100vh; }
.sidebar-header { padding: 0 2rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; }
.nav-group { padding: 1.5rem 0; flex: 1; }
.nav-label { padding: 0.5rem 2rem; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.3); margin-top: 1rem; }
.nav-item { padding: 0.8rem 2rem; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.6); border: none; background: none; width: 100%; text-align: left; font-size: 0.9rem; }
.nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: #fff; }
.nav-item.active { border-right: 4px solid var(--accent); }

/* MAIN CONTENT */
.main-content { flex: 1; margin-left: var(--sidebar-w); padding: 2rem; }
.header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
.page { display: none; animation: fadeIn 0.4s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* UI ELEMENTS */
.card { background: var(--white); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
.btn { padding: 0.8rem 1.5rem; border-radius: 5px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; font-family: inherit; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
.btn-outline { background: transparent; border: 1.5px solid var(--border); }
.btn-danger { background: #fee2e2; color: #dc2626; }

/* DATA TABLE */
table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
th { text-align: left; padding: 1rem; font-size: 0.75rem; text-transform: uppercase; color: var(--muted); border-bottom: 2px solid var(--bg); }
td { padding: 1rem; border-bottom: 1px solid var(--bg); vertical-align: middle; }
.data-img { width: 45px; height: 60px; object-fit: cover; border-radius: 4px; background: var(--bg); }

/* FORMS */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
.form-group { margin-bottom: 1.2rem; }
.label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--muted); text-transform: uppercase; }
.input, .textarea, .select { width: 100%; padding: 0.9rem; border: 1.5px solid var(--border); border-radius: 6px; outline: none; font-size: 0.9rem; transition: 0.3s; }
.input:focus { border-color: var(--accent); }

/* IMAGE PREVIEWER */
.preview-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1rem; }
.preview-box { width: 80px; height: 100px; position: relative; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
.preview-box img { width: 100%; height: 100%; object-fit: cover; }
.remove-img { position: absolute; top: 2px; right: 2px; background: rgba(220,38,38,0.9); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; }

/* MODAL */
.modal-wrap { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; }
.modal-wrap.active { display: flex; }
.modal-content { background: var(--white); width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; border-radius: var(--radius); position: relative; }
.modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-body { padding: 2rem; }
.modal-footer { padding: 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

.toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--primary); color: #fff; padding: 1rem 2rem; border-radius: 5px; transform: translateY(100px); transition: 0.3s; z-index: 9999; box-shadow: var(--shadow); }
.toast.show { transform: translateY(0); }
</style>
</head>
<body>

<div class="auth-overlay" id="authScreen">
  <div class="auth-card">
    <h1 style="font-family:'Playfair Display',serif; margin-bottom:1.5rem;">Avera Control</h1>
    <input type="password" id="adminPass" class="input" placeholder="Giriş şifrəsi" style="text-align:center; margin-bottom:1rem;">
    <button class="btn btn-primary" style="width:100%" onclick="login()">Sistemi Aç</button>
  </div>
</div>

<aside class="sidebar">
  <div class="sidebar-header">Avera Atelier</div>
  <nav class="nav-group">
    <div class="nav-label">Kataloq</div>
    <button class="nav-item active" onclick="navTo('products', this)">Məhsullar</button>
    
    <div class="nav-label">Məzmun (CMS)</div>
    <button class="nav-item" onclick="navTo('cms-hero', this)">Ana Səhifə (Hero)</button>
    <button class="nav-item" onclick="navTo('cms-about', this)">Haqqımızda</button>
    
    <div class="nav-label">Sistem</div>
    <button class="nav-item" onclick="navTo('settings', this)">Parametrlər</button>
  </nav>
</aside>

<main class="main-content">
  <div class="header-bar"><h2 id="pageTitle">Məhsul İdarəetməsi</h2><span id="liveClock" style="font-weight:600; color:var(--muted)"></span></div>

  <div class="page active" id="page-products">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
      <div id="statsInfo" style="font-size:0.9rem; color:var(--muted)">Yüklənir...</div>
      <button class="btn btn-primary" onclick="openProductModal()">+ Yeni Məhsul Əlavə Et</button>
    </div>
    <div class="card" id="productsTableContainer" style="overflow-x:auto;"></div>
  </div>

  <div class="page" id="page-cms-hero">
    <div class="card">
      <div class="form-group">
        <label class="label">Ana Başlıq (Hero Title)</label>
        <input class="input" id="heroTitle" placeholder="Məs: Avera Atelier">
      </div>
      <div class="form-group">
        <label class="label">Alt Başlıq (Hero Subtitle)</label>
        <input class="input" id="heroSub" placeholder="Məs: Fashion & Style">
      </div>
      <button class="btn btn-primary" onclick="updateCMS()">Dizaynı Yenilə</button>
    </div>
  </div>

  <div class="page" id="page-cms-about">
    <div class="card">
      <div class="form-group">
        <label class="label">Bölmə Başlığı</label>
        <input class="input" id="aboutTitle" placeholder="Məs: Zamansız Zəriflik">
      </div>
      <div class="form-group">
        <label class="label">Geniş Mətn (Haqqımızda)</label>
        <textarea class="textarea" id="aboutText" style="height:250px;"></textarea>
      </div>
      <button class="btn btn-primary" onclick="updateCMS()">Məlumatları Saxla</button>
    </div>
  </div>

  <div class="page" id="page-settings">
    <div class="card">
      <div class="form-grid">
        <div class="form-group">
          <label class="label">WhatsApp Nömrəsi (Link üçün)</label>
          <input class="input" id="setWa" placeholder="Məs: 994551234567">
        </div>
        <div class="form-group">
          <label class="label">Instagram Linki</label>
          <input class="input" id="setInsta">
        </div>
      </div>
      <div class="form-group">
        <label class="label">Admin Paneli Şifrəsi</label>
        <input type="password" class="input" id="setPass" placeholder="Dəyişmək istəmirsinizsə boş qoyun">
      </div>
      <button class="btn btn-primary" onclick="saveSettings()">Sistemi Yenilə</button>
    </div>
  </div>
</main>

<div class="modal-wrap" id="productModal">
  <div class="modal-content">
    <div class="modal-header"><h3 id="mTitle">Məhsul Detalları</h3><button onclick="closeModal('productModal')" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button></div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      
      <div class="form-group">
        <label class="label">Məhsul Şəkilləri (Qalereya)</label>
        <div class="image-upload-box">
          <p style="font-weight:600; color:var(--muted)">Şəkilləri seçin və ya bura dartın</p>
          <input type="file" multiple accept="image/*" onchange="processUploads(event)">
        </div>
        <div class="preview-grid" id="previewGrid"></div>
      </div>

      <div class="form-group">
        <label class="label">Məhsulun Adı</label>
        <input class="input" id="pName">
      </div>

      <div class="form-group">
        <label class="label">Təsvir</label>
        <textarea class="textarea" id="pDesc"></textarea>
      </div>

      <div class="form-grid">
        <div class="form-group"><label class="label">Qiymət (₼)</label><input type="number" class="input" id="pPrice"></div>
        <div class="form-group">
          <label class="label">Kateqoriya</label>
          <select class="select" id="pType"><option value="couture">Couture</option><option value="rental">Kirayə</option></select>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group"><label class="label">Ölçülər (vergüllə)</label><input class="input" id="pSizes" placeholder="S, M, L"></div>
        <div class="form-group">
          <label class="label">Vitrində Göstərilsin?</label>
          <select class="select" id="pFeat"><option value="false">Xeyr</option><option value="true">Bəli (Seçilmiş)</option></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('productModal')">Ləğv et</button>
      <button class="btn btn-primary" id="saveActionBtn" onclick="commitProduct()">Yadda Saxla</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// --- CORE CONFIG ---
const supa = supabase.createClient('https://ijljnzqigtfonvqlkhkr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqbGpuenFpZ3Rmb252cWxraGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjY5NzAsImV4cCI6MjA5MDcwMjk3MH0.KDnvL1F-Zwae5fyEzEyGNAT7QYT0L7KKy1g84LQTLDU');
const CLOUD_URL = 'https://api.cloudinary.com/v1_1/dxigokm01/image/upload';
const CLOUD_PRESET = 'avera_preset';

let state = { products: [], images: [], currentCms: null };

// --- AUTH ---
function login() {
  const p = document.getElementById('adminPass').value;
  const saved = localStorage.getItem('avera_secure_p') || 'avera2026';
  if(p === saved) {
    document.getElementById('authScreen').classList.add('hidden');
    init();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}

// --- INITIALIZATION ---
async function init() {
  updateClock(); setInterval(updateClock, 1000);
  await Promise.all([loadProducts(), loadCMS()]);
}

function updateClock() {
  const now = new Date();
  document.getElementById('liveClock').textContent = now.toLocaleTimeString('az-AZ');
}

// --- NAVIGATION ---
function navTo(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pageTitle').textContent = btn.textContent;
}

// --- CMS LOGIC ---
async function loadCMS() {
  const { data } = await supa.from('app_settings').select('*').eq('id', 1).single();
  if(data) {
    state.currentCms = data;
    document.getElementById('heroTitle').value = data.hero_title || '';
    document.getElementById('heroSub').value = data.hero_sub || '';
    document.getElementById('aboutTitle').value = data.about_title || '';
    document.getElementById('aboutText').value = data.about_text || '';
    document.getElementById('setWa').value = data.whatsapp || '';
    document.getElementById('setInsta').value = data.instagram || '';
  }
}

async function updateCMS() {
  const payload = {
    hero_title: document.getElementById('heroTitle').value,
    hero_sub: document.getElementById('heroSub').value,
    about_title: document.getElementById('aboutTitle').value,
    about_text: document.getElementById('aboutText').value
  };
  await supa.from('app_settings').upsert({id:1, ...payload});
  notify('Sayt məlumatları yeniləndi');
}

async function saveSettings() {
  const wa = document.getElementById('setWa').value.replace(/[^0-9]/g, '');
  const pass = document.getElementById('setPass').value;
  if(pass) localStorage.setItem('avera_secure_p', pass);
  
  await supa.from('app_settings').upsert({
    id:1, 
    whatsapp: wa, 
    instagram: document.getElementById('setInsta').value 
  });
  notify('Sistem ayarları saxlanıldı');
}

// --- PRODUCT LOGIC ---
async function loadProducts() {
  const {data} = await supa.from('products').select('*').order('created_at', {ascending:false});
  state.products = data || [];
  document.getElementById('statsInfo').textContent = `${state.products.length} aktiv məhsul`;
  
  let html = `<table><thead><tr><th>Fayl</th><th>Məhsul</th><th>Növ</th><th>Qiymət</th><th>Vitrində</th><th>Status</th><th></th></tr></thead><tbody>`;
  state.products.forEach(p => {
    html += `<tr>
      <td><img src="${p.images?.[0] || ''}" class="data-img"></td>
      <td><strong>${p.name.az}</strong></td>
      <td><span style="text-transform:capitalize">${p.type}</span></td>
      <td>${p.price} ₼</td>
      <td>${p.collection_id === 'featured' ? '✅' : '—'}</td>
      <td><span style="color:${p.status==='active'?'green':'gray'}">${p.status}</span></td>
      <td>
        <button class="btn btn-sm btn-outline" onclick="editProd('${p.id}')">Düzəliş</button>
        <button class="btn btn-sm btn-danger" onclick="deleteProd('${p.id}')">Sil</button>
      </td>
    </tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('productsTableContainer').innerHTML = html;
}

function openProductModal() {
  document.getElementById('editId').value = '';
  document.getElementById('mTitle').textContent = 'Yeni Məhsul';
  ['pName','pDesc','pPrice','pSizes'].forEach(id => document.getElementById(id).value = '');
  state.images = [];
  renderPreviews();
  openModal('productModal');
}

async function editProd(id) {
  const p = state.products.find(x => x.id === id);
  if(!p) return;
  document.getElementById('editId').value = p.id;
  document.getElementById('pName').value = p.name.az;
  document.getElementById('pDesc').value = p.description.az;
  document.getElementById('pPrice').value = p.price;
  document.getElementById('pType').value = p.type;
  document.getElementById('pFeat').value = p.collection_id === 'featured' ? 'true' : 'false';
  document.getElementById('pSizes').value = p.sizes?.join(', ') || '';
  state.images = p.images || [];
  renderPreviews();
  openModal('productModal');
}

async function commitProduct() {
  const id = document.getElementById('editId').value;
  const btn = document.getElementById('saveActionBtn');
  btn.disabled = true; btn.textContent = 'Saxlanılır...';

  const name = document.getElementById('pName').value;
  const desc = document.getElementById('pDesc').value;

  const payload = {
    name: { az: name, ru: name, en: name },
    description: { az: desc, ru: desc, en: desc },
    price: parseFloat(document.getElementById('pPrice').value) || 0,
    type: document.getElementById('pType').value,
    collection_id: document.getElementById('pFeat').value === 'true' ? 'featured' : null,
    sizes: document.getElementById('pSizes').value.split(',').map(s=>s.trim()).filter(Boolean),
    images: state.images,
    status: 'active'
  };

  if(id) await supa.from('products').update(payload).eq('id', id);
  else await supa.from('products').insert([payload]);

  btn.disabled = false; btn.textContent = 'Yadda Saxla';
  closeModal('productModal');
  await loadProducts();
  notify('Məhsul bazaya yazıldı');
}

async function deleteProd(id) {
  if(confirm('Silmək istədiyinizə əminsiniz?')) {
    await supa.from('products').delete().eq('id', id);
    await loadProducts();
    notify('Məhsul silindi');
  }
}

// --- UTILS ---
async function processUploads(e) {
  const files = Array.from(e.target.files);
  notify('Şəkillər buluda ötürülür...');
  for(let f of files) {
    const fd = new FormData();
    fd.append('file', f);
    fd.append('upload_preset', CLOUD_PRESET);
    const r = await fetch(CLOUD_URL, {method:'POST', body:fd});
    const d = await r.json();
    if(d.secure_url) state.images.push(d.secure_url);
  }
  renderPreviews();
}

function renderPreviews() {
  const c = document.getElementById('previewGrid');
  c.innerHTML = state.images.map((img, i) => `<div class="preview-box"><img src="${img}"><button class="remove-img" onclick="state.images.splice(${i},1);renderPreviews()">&times;</button></div>`).join('');
}

function notify(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.className = 'toast show';
  setTimeout(()=>t.className='toast', 3000);
}
function openModal(id){ document.getElementById(id).classList.add('active'); }
function closeModal(id){ document.getElementById(id).classList.remove('active'); }
</script>
</body>
</html>
