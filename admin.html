<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avera Atelier — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Nunito+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #f4efe6; --cream-dark: #e8e0d2; --warm-white: #faf8f4;
  --charcoal: #2c2826; --charcoal-light: #3d3835; --taupe: #8a7e74;
  --taupe-light: #b0a69c; --rose: #c4727e; --rose-bg: #fdf5f6;
  --emerald: #2a5a40; --emerald-bg: #f0f7f3; --red: #c45858;
  --sidebar-w: 260px;
  --heading: 'Playfair Display', Georgia, serif;
  --body: 'Nunito Sans', 'Helvetica Neue', sans-serif;
  --shadow-sm: 0 1px 3px rgba(44,40,38,0.06);
  --shadow-md: 0 4px 20px rgba(44,40,38,0.08);
  --radius: 8px; --radius-sm: 5px;
}

html { scroll-behavior: smooth; }
body { background: #f7f4ef; color: var(--charcoal); font-family: var(--body); font-size: 14px; -webkit-font-smoothing: antialiased; }

/* ═══ LOGIN SCREEN ═══ */
.login-screen { position: fixed; inset: 0; z-index: 9999; background: var(--warm-white); display: flex; align-items: center; justify-content: center; transition: all 0.5s ease; }
.login-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.login-box { width: 380px; padding: 3rem; background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-md); text-align: center; }
.login-logo { font-family: var(--heading); font-size: 2.2rem; font-style: italic; margin-bottom: 0.3rem; }
.login-field { margin-bottom: 1rem; text-align: left; }
.login-field label { display: block; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--taupe); margin-bottom: 0.4rem; }
.login-field input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--cream-dark); border-radius: var(--radius-sm); font-family: var(--body); font-size: 0.9rem; outline: none; }
.login-field input:focus { border-color: var(--rose); }
.login-btn { width: 100%; padding: 0.85rem; background: var(--charcoal); color: var(--cream); border: none; border-radius: var(--radius-sm); font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; margin-top: 0.5rem; transition: background 0.3s; }
.login-btn:hover { background: var(--charcoal-light); }
.login-error { color: var(--red); font-size: 0.78rem; margin-top: 0.8rem; display: none; }

/* ═══ SIDEBAR & LAYOUT ═══ */
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w); background: var(--charcoal); padding: 1.5rem 0; display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s ease; }
.sidebar-brand { padding: 0.5rem 1.8rem 1.8rem; border-bottom: 1px solid rgba(244,239,230,0.08); }
.sidebar-brand-name { font-family: var(--heading); font-size: 1.4rem; font-style: italic; color: var(--cream); }
.sidebar-nav { flex: 1; padding: 1rem 0; overflow-y: auto; }
.sidebar-section-label { padding: 1rem 1.8rem 0.5rem; font-size: 0.55rem; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(244,239,230,0.2); }
.sidebar-link { display: flex; align-items: center; gap: 0.8rem; padding: 0.7rem 1.8rem; font-size: 0.82rem; color: rgba(244,239,230,0.5); cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-family: var(--body); transition: all 0.2s; }
.sidebar-link:hover { color: var(--cream); background: rgba(244,239,230,0.05); }
.sidebar-link.active { color: var(--cream); background: rgba(244,239,230,0.08); border-right: 3px solid var(--rose); }
.sidebar-link svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.sidebar-footer { padding: 1rem 1.8rem; border-top: 1px solid rgba(244,239,230,0.08); }
.sidebar-logout { display: flex; align-items: center; gap: 0.6rem; font-size: 0.78rem; color: rgba(244,239,230,0.35); cursor: pointer; background: none; border: none; font-family: var(--body); transition: color 0.3s; }
.sidebar-logout:hover { color: var(--red); }

.main { margin-left: var(--sidebar-w); min-height: 100vh; }
.topbar { position: sticky; top: 0; z-index: 50; background: rgba(247,244,239,0.92); backdrop-filter: blur(15px); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(232,224,210,0.5); }
.topbar-title { font-family: var(--heading); font-size: 1.3rem; font-weight: 500; }
.content { padding: 2rem; }
.page { display: none; } .page.active { display: block; }

/* ═══ UI COMPONENTS ═══ */
.panel { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-sm); margin-bottom: 1.5rem; }
.panel-header { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--cream-dark); display: flex; justify-content: space-between; align-items: center; }
.panel-title { font-family: var(--heading); font-size: 1.05rem; font-weight: 500; }
.panel-body { padding: 1.5rem; }

.btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.2rem; border: none; border-radius: var(--radius-sm); font-family: var(--body); font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s ease; }
.btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.btn-primary { background: var(--charcoal); color: var(--cream); }
.btn-primary:hover { background: var(--charcoal-light); transform: translateY(-1px); }
.btn-outline { background: transparent; border: 1.5px solid var(--cream-dark); }
.btn-outline:hover { border-color: var(--charcoal); }
.btn-danger { background: var(--red); color: #fff; }
.btn-sm { padding: 0.4rem 0.8rem; font-size: 0.7rem; }

table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 0.8rem 1rem; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--taupe-light); border-bottom: 2px solid var(--cream-dark); }
td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--cream); vertical-align: middle; }
tr:hover td { background: var(--warm-white); }
.product-thumb { width: 50px; height: 60px; border-radius: var(--radius-sm); object-fit: cover; background: var(--cream); display: flex; align-items: center; justify-content: center; font-family: var(--heading); font-style: italic; color: var(--taupe-light); font-size: 0.7rem; }
.badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.65rem; font-weight: 600; }
.badge-active { background: var(--emerald-bg); color: var(--emerald); }
.badge-draft { background: var(--cream); color: var(--taupe); }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.form-group { margin-bottom: 1rem; }
.form-label { display: block; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--taupe); margin-bottom: 0.4rem; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 0.7rem 0.9rem; border: 1.5px solid var(--cream-dark); border-radius: var(--radius-sm); font-family: var(--body); font-size: 0.85rem; background: var(--warm-white); outline: none; transition: border-color 0.3s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--rose); }
.form-textarea { resize: vertical; min-height: 80px; }

.modal-overlay { position: fixed; inset: 0; z-index: 999; background: rgba(44,40,38,0.4); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.3s; }
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal { background: #fff; border-radius: var(--radius); width: 90%; max-width: 650px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-md); transform: translateY(20px); transition: all 0.3s; }
.modal-overlay.active .modal { transform: translateY(0); }
.modal-header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--cream-dark); display: flex; justify-content: space-between; }
.modal-title { font-family: var(--heading); font-size: 1.2rem; font-weight: 500; }
.modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--taupe); }
.modal-body { padding: 2rem; }
.modal-footer { padding: 1rem 2rem; border-top: 1px solid var(--cream-dark); display: flex; justify-content: flex-end; gap: 0.8rem; }

.image-upload { border: 2px dashed var(--cream-dark); border-radius: var(--radius); padding: 2rem; text-align: center; cursor: pointer; position: relative; transition: all 0.3s; }
.image-upload:hover { border-color: var(--rose); background: var(--rose-bg); }
.image-upload svg { width: 32px; height: 32px; stroke: var(--taupe-light); fill: none; margin-bottom: 0.5rem; }
.image-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.image-preview { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-top: 1rem; }
.image-preview-item { width: 80px; height: 80px; border-radius: var(--radius-sm); position: relative; overflow: hidden; }
.image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
.image-preview-remove { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; background: var(--red); color: #fff; border: none; border-radius: 50%; font-size: 0.65rem; cursor: pointer; }

.toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 9999; padding: 1rem 1.5rem; background: var(--charcoal); color: var(--cream); border-radius: var(--radius-sm); transform: translateY(100px); opacity: 0; transition: all 0.3s; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { border-left: 4px solid var(--red); }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Avera</div>
    <div class="login-field"><label>İstifadəçi adı</label><input type="text" id="loginUser" placeholder="admin"></div>
    <div class="login-field"><label>Şifrə</label><input type="password" id="loginPass" placeholder="••••••"></div>
    <button class="login-btn" onclick="doLogin()">Daxil Ol</button>
    <div class="login-error" id="loginError">Yanlış məlumat</div>
  </div>
</div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><div class="sidebar-brand-name">Avera Admin</div></div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Məhsullar</div>
    <button class="sidebar-link active" onclick="showPage('products', this)">
      <svg viewBox="0 0 24 24"><path d="M20.38 3.46L16.01 2 7.99 4.46 3.62 2.99a1 1 0 00-1.34.65l-.01.04L2 22l4.37-1.46L14.39 23l4.37-1.46a1 1 0 00.65-1.34L20.38 3.46z"/><line x1="8" y1="5" x2="8" y2="22"/><line x1="16" y1="2" x2="16" y2="19"/></svg>
      Bütün Məhsullar
    </button>
    
    <div class="sidebar-section-label">Sayt İdarəetməsi</div>
    <button class="sidebar-link" onclick="showPage('cms', this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      Sayt Dizaynı
    </button>

    <div class="sidebar-section-label">Sistem</div>
    <button class="sidebar-link" onclick="showPage('settings', this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Parametrlər
    </button>
  </nav>
  <div class="sidebar-footer">
    <button class="sidebar-logout" onclick="doLogout()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Çıxış</button>
  </div>
</aside>

<div class="main">
  <div class="topbar"><div class="topbar-title" id="pageTitle">Məhsullar</div></div>
  <div class="content">

    <div class="page active" id="page-products">
      <div style="display:flex;justify-content:space-between;margin-bottom:1.5rem;">

        <button class="btn btn-primary" onclick="openProductModal()">+ Yeni Məhsul</button>

    </div>

    <div class="page" id="page-cms">
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Ana Səhifə (Hero & Haqqımızda)</div></div>
        <div class="panel-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Ana Başlıq (Hero Title)</label>
              <input class="form-input" id="cmsHeroTitle" placeholder="Məs: Avera">
            </div>
            <div class="form-group">
              <label class="form-label">Alt Başlıq (Hero Sub)</label>
              <input class="form-input" id="cmsHeroSub" placeholder="Məs: Fashion & Style">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Haqqımızda Başlığı</label>
            <input class="form-input" id="cmsAboutTitle" placeholder="Zamansız Zəriflik">
          </div>
          <div class="form-group">
            <label class="form-label">Haqqımızda Mətni</label>
            <textarea class="form-textarea" id="cmsAboutText"></textarea>
          </div>
          <button class="btn btn-primary" onclick="saveCMS()">Dizaynı Yadda Saxla</button>
        </div>
      </div>
    </div>

    <div class="page" id="page-settings">
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Sistem & Əlaqə Parametrləri</div></div>
        <div class="panel-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">WhatsApp Nömrəsi (Saytdan Sifariş Üçün)</label>
              <input class="form-input" id="setWa" placeholder="Məs: 994551234567">

              <label class="form-label">Instagram Linki</label>
              <input class="form-input" id="setInsta" placeholder="https://instagram.com/...">

            <div class="form-group">

            </div>

          <button class="btn btn-primary" onclick="saveSettings()">Parametrləri Yadda Saxla</button>

      </div>
    </div>

  </div>
</div>

<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="productModalTitle">Yeni Məhsul</div>
      <button class="modal-close" onclick="closeModal('productModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editProductId">

      <div class="form-group">
        <label class="form-label">Şəkillər (Birdən çox seçə bilərsiniz)</label>
        <div class="image-upload" id="imageUploadArea">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <p>Şəkil yükləyin</p>
          <input type="file" accept="image/*" onchange="handleImageUpload(event)" multiple>
        </div>
        <div class="image-preview" id="imagePreview"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Məhsul adı (AZ)</label>
        <input class="form-input" id="pName" placeholder="Məs: İpək Axşam Donu">
      </div>
      <div class="form-group">
        <label class="form-label">Təsvir (AZ)</label>
        <textarea class="form-textarea" id="pDesc"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group"><label class="form-label">Qiymət (AZN)</label><input class="form-input" type="number" id="pPrice" placeholder="0"></div>
        <div class="form-group">
          <label class="form-label">Növ</label>
          <select class="form-select" id="pType"><option value="couture">Couture</option><option value="rental">Kirayə</option></select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group"><label class="form-label">Ölçülər (vergüllə ayırın)</label><input class="form-input" id="pSizes" placeholder="S, M, L"></div>
        <div class="form-group"><label class="form-label">Parça / Material</label><input class="form-input" id="pFabric" placeholder="Məs: İpək, Saten"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="pStatus"><option value="active">Aktiv</option><option value="draft">Qaralama</option></select>
        </div>
        <div class="form-group">
          <label class="form-label" style="color:var(--rose)">Ana Səhifədə Göstərilsin? (Önə Çıxan)</label>
          <select class="form-select" id="pFeatured"><option value="false">Xeyr</option><option value="true">Bəli</option></select>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('productModal')">Ləğv et</button>
      <button class="btn btn-primary" id="saveProdBtn" onclick="saveProduct()">Yadda Saxla</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══ CONFIGURATION ═══
// 1. SUPABASE
const supa = supabase.createClient('https://ijljnzqigtfonvqlkhkr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqbGpuenFpZ3Rmb252cWxraGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjY5NzAsImV4cCI6MjA5MDcwMjk3MH0.KDnvL1F-Zwae5fyEzEyGNAT7QYT0L7KKy1g84LQTLDU');

// 2. CLOUDINARY (Öz məlumatlarını bura yaz)
const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/dxigokm01/image/upload'; // Bulud adını (cloud_name) dəyiş
const CLOUDINARY_PRESET = 'avera_preset'; // Upload preset adını dəyiş

// ═══ APP STATE ═══
let uploadedImages = [];

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ═══ LOGIN ═══
function doLogin() {
  const user = document.getElementById('loginUser').value;
  const pass = document.getElementById('loginPass').value;
  // Bəsit qorunma (realda bazadan oxunmalıdır)
  if (user === 'admin' && (pass === 'avera2026' || pass === localStorage.getItem('avera_pass'))) {
    document.getElementById('loginScreen').classList.add('hidden');
    loadProducts();
    loadCMS();
    loadSettings();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function doLogout() { location.reload(); }

// ═══ NAVIGATION ═══
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  btn.classList.add('active');
  const titles = { products: 'Məhsullar', cms: 'Sayt Dizaynı', settings: 'Parametrlər' };
  document.getElementById('pageTitle').textContent = titles[id];
}

// ═══ MODAL ═══
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// ═══ CLOUDINARY IMAGE UPLOAD ═══
async function handleImageUpload(e) {
  const files = Array.from(e.target.files);
  const uploadArea = document.getElementById('imageUploadArea');
  const ogHtml = uploadArea.innerHTML;
  
  uploadArea.innerHTML = '<p style="color:var(--rose);font-weight:bold;">Yüklənir... Gözləyin⏳</p>';
  
  for (let file of files) {
    if (file.size > 5 * 1024 * 1024) continue;
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', CLOUDINARY_PRESET);
    try {
      const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
      const data = await res.json();
      if (data.secure_url) uploadedImages.push(data.secure_url);
    } catch (err) { console.error('Şəkil xətası:', err); }
  }
  uploadArea.innerHTML = ogHtml;
  e.target.value = '';
  renderImagePreviews();
}

function renderImagePreviews() {
  const c = document.getElementById('imagePreview');
  c.innerHTML = uploadedImages.map((img, i) => `<div class="image-preview-item"><img src="${img}"><button class="image-preview-remove" onclick="uploadedImages.splice(${i},1);renderImagePreviews();">&times;</button></div>`).join('');
}

// ═══ PRODUCTS CRUD ═══
async function loadProducts() {
  const c = document.getElementById('productsTable');
  c.innerHTML = 'Yüklənir...';
  const { data, error } = await supa.from('products').select('*').order('created_at', { ascending: false });
  if (error || !data) return c.innerHTML = 'Xəta baş verdi.';
  
  document.getElementById('productCount').textContent = data.length + ' məhsul';
  
  c.innerHTML = `<table><thead><tr><th>Şəkil</th><th>Ad</th><th>Növ</th><th>Qiymət</th><th>Önə Çıxan</th><th>Status</th><th></th></tr></thead><tbody>` + 
    data.map(p => `<tr>
      <td><div class="product-thumb" style="background-image:url('${p.images?.[0]||''}');"></div></td>
      <td><strong>${p.name?.az || 'Adsız'}</strong></td>
      <td>${p.type==='rental'?'Kirayə':'Couture'}</td>
      <td>${p.price?p.price+' ₼':''}</td>
      <td><span class="badge ${p.collection_id==='featured'?'badge-active':''}">${p.collection_id==='featured'?'Bəli':'Xeyr'}</span></td>
      <td><span class="badge ${p.status==='active'?'badge-active':'badge-draft'}">${p.status==='active'?'Aktiv':'Qaralama'}</span></td>
      <td><button class="btn btn-sm btn-outline" onclick="editProd('${p.id}')">Düzəliş</button> <button class="btn btn-sm btn-danger" onclick="delProd('${p.id}')">Sil</button></td>
    </tr>`).join('') + `</tbody></table>`;
}

function openProductModal() {
  document.getElementById('editProductId').value = '';
  ['pName','pDesc','pPrice','pSizes','pFabric'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('pType').value = 'couture';
  document.getElementById('pStatus').value = 'active';
  document.getElementById('pFeatured').value = 'false';
  uploadedImages = []; renderImagePreviews();
  openModal('productModal');
}

async function editProd(id) {
  const { data } = await supa.from('products').select('*').eq('id', id).single();
  if(!data) return;
  document.getElementById('editProductId').value = data.id;
  document.getElementById('pName').value = data.name?.az || '';
  document.getElementById('pDesc').value = data.description?.az || '';
  document.getElementById('pPrice').value = data.price || '';
  document.getElementById('pType').value = data.type || 'couture';
  document.getElementById('pStatus').value = data.status || 'active';
  document.getElementById('pFeatured').value = data.collection_id === 'featured' ? 'true' : 'false';
  document.getElementById('pSizes').value = data.sizes ? data.sizes.join(', ') : '';
  document.getElementById('pFabric').value = data.fabric || '';
  uploadedImages = data.images || []; renderImagePreviews();
  openModal('productModal');
}

async function saveProduct() {
  const name = document.getElementById('pName').value.trim();
  if(!name) return showToast('Ad tələb olunur', 'error');
  
  const id = document.getElementById('editProductId').value;
  const isFeat = document.getElementById('pFeatured').value === 'true';
  
  const pData = {
    name: { az: name, en: name, ru: name },
    description: { az: document.getElementById('pDesc').value, en: '', ru: '' },
    price: parseFloat(document.getElementById('pPrice').value) || 0,
    type: document.getElementById('pType').value,
    status: document.getElementById('pStatus').value,
    collection_id: isFeat ? 'featured' : null, // Önə çıxanları belə filterləyəcəyik
    sizes: document.getElementById('pSizes').value.split(',').map(s=>s.trim()).filter(Boolean),
    fabric: document.getElementById('pFabric').value.trim(),
    images: uploadedImages,
    updated_at: new Date().toISOString()
  };

  document.getElementById('saveProdBtn').textContent = 'Yüklənir...';
  
  if (id) await supa.from('products').update(pData).eq('id', id);
  else await supa.from('products').insert([pData]);
  
  document.getElementById('saveProdBtn').textContent = 'Yadda Saxla';
  closeModal('productModal');
  loadProducts();
  showToast('Uğurla saxlanıldı');
}

async function delProd(id) {
  if(confirm('Əminsiniz?')) {
    await supa.from('products').delete().eq('id', id);
    loadProducts(); showToast('Silindi');
  }
}

// ═══ CMS & SETTINGS ═══
async function loadCMS() {
  const { data } = await supa.from('app_settings').select('*').eq('id', 1).single();
  if (data) {
    document.getElementById('cmsHeroTitle').value = data.hero_title || '';
    document.getElementById('cmsHeroSub').value = data.hero_sub || '';
    document.getElementById('cmsAboutTitle').value = data.about_title || '';
    document.getElementById('cmsAboutText').value = data.about_text || '';
  }
}

async function saveCMS() {
  const d = {
    hero_title: document.getElementById('cmsHeroTitle').value,
    hero_sub: document.getElementById('cmsHeroSub').value,
    about_title: document.getElementById('cmsAboutTitle').value,
    about_text: document.getElementById('cmsAboutText').value,
  };
  await supa.from('app_settings').upsert({ id: 1, ...d });
  showToast('Dizayn yeniləndi!');
}

async function loadSettings() {
  const { data } = await supa.from('app_settings').select('*').eq('id', 1).single();
  if (data) {
    document.getElementById('setWa').value = data.whatsapp || '';
    document.getElementById('setInsta').value = data.instagram || '';
    document.getElementById('setAddress').value = data.address || '';
  }
}

async function saveSettings() {
  const pass = document.getElementById('setPass').value;
  if(pass) localStorage.setItem('avera_pass', pass);

  const wa = document.getElementById('setWa').value.replace(/[^0-9]/g, '');
  const d = {
    whatsapp: wa,
    instagram: document.getElementById('setInsta').value,
    address: document.getElementById('setAddress').value
  };
  await supa.from('app_settings').upsert({ id: 1, ...d });
  showToast('Parametrlər saxlanıldı!');
}
</script>
