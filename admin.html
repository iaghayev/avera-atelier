<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avera Atelier — Professional Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Nunito+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --cream: #f4efe6; --cream-dark: #e8e0d2; --warm-white: #faf8f4;
  --charcoal: #2c2826; --charcoal-light: #3d3835; --taupe: #8a7e74;
  --taupe-light: #b0a69c; --rose: #c4727e; --rose-bg: #fdf5f6;
  --emerald: #2a5a40; --emerald-bg: #f0f7f3; --red: #c45858;
  --sidebar-w: 260px;
  --heading: 'Playfair Display', Georgia, serif;
  --body: 'Nunito Sans', sans-serif;
  --shadow-sm: 0 1px 3px rgba(44,40,38,0.06);
  --shadow-md: 0 4px 20px rgba(44,40,38,0.08);
  --radius: 8px;
}

body { background: #f7f4ef; color: var(--charcoal); font-family: var(--body); -webkit-font-smoothing: antialiased; }

/* LOGIN */
.login-screen { position: fixed; inset: 0; z-index: 9999; background: var(--warm-white); display: flex; align-items: center; justify-content: center; }
.login-screen.hidden { display: none; }
.login-box { width: 380px; padding: 3rem; background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-md); text-align: center; }
.login-logo { font-family: var(--heading); font-size: 2.2rem; font-style: italic; margin-bottom: 2rem; }
.login-field { margin-bottom: 1rem; text-align: left; }
.login-field input { width: 100%; padding: 0.8rem; border: 1.5px solid var(--cream-dark); border-radius: 5px; outline: none; }
.login-btn { width: 100%; padding: 0.9rem; background: var(--charcoal); color: var(--cream); border: none; border-radius: 5px; cursor: pointer; font-weight: 600; text-transform: uppercase; }

/* SIDEBAR */
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w); background: var(--charcoal); padding: 1.5rem 0; display: flex; flex-direction: column; z-index: 100; }
.sidebar-brand { padding: 0 1.8rem 1.8rem; border-bottom: 1px solid rgba(244,239,230,0.08); }
.sidebar-brand-name { font-family: var(--heading); font-size: 1.4rem; font-style: italic; color: var(--cream); }
.sidebar-nav { flex: 1; padding: 1rem 0; }
.sidebar-section-label { padding: 1rem 1.8rem 0.5rem; font-size: 0.6rem; font-weight: 700; color: rgba(244,239,230,0.2); text-transform: uppercase; letter-spacing: 1px; }
.sidebar-link { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1.8rem; color: rgba(244,239,230,0.5); cursor: pointer; border: none; background: none; width: 100%; text-align: left; transition: 0.2s; font-family: var(--body); }
.sidebar-link:hover { color: var(--cream); background: rgba(255,255,255,0.05); }
.sidebar-link.active { color: var(--cream); background: rgba(255,255,255,0.08); border-right: 4px solid var(--rose); }

.main { margin-left: var(--sidebar-w); min-height: 100vh; }
.topbar { position: sticky; top: 0; background: rgba(247,244,239,0.9); backdrop-filter: blur(10px); padding: 1.2rem 2rem; border-bottom: 1px solid var(--cream-dark); z-index: 50; }
.content { padding: 2rem; }
.page { display: none; } .page.active { display: block; }

/* UI COMPONENTS */
.panel { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-sm); margin-bottom: 2rem; overflow: hidden; }
.panel-header { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--cream-dark); display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
.panel-title { font-family: var(--heading); font-weight: 600; }
.panel-body { padding: 1.5rem; }

.btn { padding: 0.6rem 1.2rem; border-radius: 5px; cursor: pointer; font-family: var(--body); font-size: 0.75rem; font-weight: 600; border: none; transition: 0.2s; }
.btn-primary { background: var(--charcoal); color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--cream-dark); }
.btn-danger { background: #fee2e2; color: #dc2626; }
.btn-sm { padding: 0.4rem 0.8rem; }

table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 1rem; font-size: 0.7rem; color: var(--taupe); border-bottom: 1px solid var(--cream-dark); text-transform: uppercase; }
td { padding: 1rem; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
.thumb { width: 50px; height: 65px; border-radius: 4px; object-fit: cover; background: #eee; }

.form-group { margin-bottom: 1.2rem; }
.form-label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--taupe); }
.form-input, .form-textarea, .form-select { width: 100%; padding: 0.8rem; border: 1px solid var(--cream-dark); border-radius: 5px; outline: none; font-family: var(--body); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: #fff; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; border-radius: 10px; }
.modal-header { padding: 1.5rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
.modal-body { padding: 1.5rem; }
.modal-footer { padding: 1.2rem; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 10px; }

/* IMAGE PREVIEW */
.image-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
.preview-item { width: 80px; height: 100px; position: relative; border-radius: 4px; overflow: hidden; }
.preview-item img { width: 100%; height: 100%; object-fit: cover; }
.preview-remove { position: absolute; top: 0; right: 0; background: red; color: white; border: none; cursor: pointer; padding: 2px 5px; }

.image-upload-box { border: 2px dashed var(--cream-dark); padding: 2rem; text-align: center; border-radius: 10px; cursor: pointer; position: relative; }
.image-upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

.toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; padding: 15px 25px; border-radius: 5px; transform: translateY(100px); transition: 0.3s; z-index: 9999; }
.toast.show { transform: translateY(0); }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Avera Atelier</div>
    <div class="login-field"><input type="password" id="loginPass" placeholder="Şifrəni daxil edin"></div>
    <button class="login-btn" onclick="doLogin()">Giriş</button>
    <div id="loginErr" style="color:red; display:none; margin-top:10px;">Yanlış şifrə</div>
  </div>
</div>

<aside class="sidebar">
  <div class="sidebar-brand"><div class="sidebar-brand-name">Avera Admin</div></div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Mağaza</div>
    <button class="sidebar-link active" onclick="showPage('products', this)">Məhsullar</button>
    
    <div class="sidebar-section-label">Vebsayt CMS</div>
    <button class="sidebar-link" onclick="showPage('cms-hero', this)">Ana Səhifə (Hero)</button>
    <button class="sidebar-link" onclick="showPage('cms-about', this)">Haqqımızda Bölməsi</button>
    
    <div class="sidebar-section-label">Ayarlar</div>
    <button class="sidebar-link" onclick="showPage('settings', this)">Sistem & Əlaqə</button>
  </nav>
  <div class="sidebar-footer">
    <button class="sidebar-logout" onclick="location.reload()">Çıxış</button>
  </div>
</aside>

<div class="main">
  <div class="topbar"><h2 id="pageTitle">Məhsul İdarəetməsi</h2></div>
  <div class="content">

    <div class="page active" id="page-products">
      <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem;">
        <p id="prodCount">Yüklənir...</p>
        <button class="btn btn-primary" onclick="openProductModal()">+ Yeni Məhsul</button>
      </div>
      <div class="panel">
        <div class="panel-body" id="productsTable"></div>
      </div>
    </div>

    <div class="page" id="page-cms-hero">
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Hero (Giriş) Bölməsi</div></div>
        <div class="panel-body">
          <div class="form-group">
            <label class="form-label">Böyük Başlıq (Hero Title)</label>
            <input class="form-input" id="inp-hero-title">
          </div>
          <div class="form-group">
            <label class="form-label">Alt Yazı (Hero Subtitle)</label>
            <input class="form-input" id="inp-hero-sub">
          </div>
          <button class="btn btn-primary" onclick="saveCMS()">Yadda Saxla</button>
        </div>
      </div>
    </div>

    <div class="page" id="page-cms-about">
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Haqqımızda Bölməsi</div></div>
        <div class="panel-body">
          <div class="form-group">
            <label class="form-label">Bölmə Başlığı</label>
            <input class="form-input" id="inp-about-title">
          </div>
          <div class="form-group">
            <label class="form-label">Haqqımızda Mətni</label>
            <textarea class="form-textarea" id="inp-about-text" style="height:200px;"></textarea>
          </div>
          <button class="btn btn-primary" onclick="saveCMS()">Yadda Saxla</button>
        </div>
      </div>
    </div>

    <div class="page" id="page-settings">
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Sistem & Əlaqə</div></div>
        <div class="panel-body">
          <div class="form-group">
            <label class="form-label">WhatsApp Nömrəsi (Link üçün)</label>
            <input class="form-input" id="inp-wa" placeholder="994551234567">
          </div>
          <div class="form-group">
            <label class="form-label">Instagram Linki</label>
            <input class="form-input" id="inp-insta">
          </div>
          <div class="form-group">
            <label class="form-label">Admin Şifrəsi</label>
            <input class="form-input" type="password" id="inp-pass" placeholder="Dəyişmək istəyirsinizsə yazın">
          </div>
          <button class="btn btn-primary" onclick="saveSettings()">Yadda Saxla</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="mTitle">Məhsul Əlavə Et</div>
      <button class="modal-close" onclick="closeModal('productModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label class="form-label">Şəkillər (Birdən çox seçin)</label>
        <div class="image-upload-box">
          <p>Şəkilləri bura atın və ya seçin</p>
          <input type="file" multiple accept="image/*" onchange="uploadImages(event)">
        </div>
        <div class="image-preview" id="previewContainer"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Məhsulun Adı</label>
        <input class="form-input" id="p-name">
      </div>
      <div class="form-group">
        <label class="form-label">Təsvir</label>
        <textarea class="form-textarea" id="p-desc"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Qiymət (₼)</label>
          <input class="form-input" type="number" id="p-price">
        </div>
        <div class="form-group">
          <label class="form-label">Kateqoriya</label>
          <select class="form-select" id="p-type">
            <option value="couture">Couture</option>
            <option value="rental">Kirayə</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ölçülər (vergüllə: S, M, L)</label>
          <input class="form-input" id="p-sizes">
        </div>
        <div class="form-group">
          <label class="form-label">Ana Səhifədə Göstərilsin?</label>
          <select class="form-select" id="p-feat">
            <option value="false">Xeyr</option>
            <option value="true">Bəli</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('productModal')">Ləğv et</button>
      <button class="btn btn-primary" id="btnSave" onclick="saveProduct()">Yadda Saxla</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// --- CONFIG ---
const supa = supabase.createClient('https://ijljnzqigtfonvqlkhkr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqbGpuenFpZ3Rmb252cWxraGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjY5NzAsImV4cCI6MjA5MDcwMjk3MH0.KDnvL1F-Zwae5fyEzEyGNAT7QYT0L7KKy1g84LQTLDU');
const CLOUD_URL = 'https://api.cloudinary.com/v1_1/dxigokm01/image/upload';
const CLOUD_PRESET = 'avera_preset';

let currentImages = [];

// --- AUTH ---
function doLogin() {
  const p = document.getElementById('loginPass').value;
  const savedP = localStorage.getItem('avera_p') || 'avera2026';
  if(p === savedP) {
    document.getElementById('loginScreen').classList.add('hidden');
    init();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}

// --- NAV ---
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pageTitle').textContent = btn.textContent;
}

// --- HELPERS ---
function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.className = 'toast show';
  setTimeout(()=>t.className='toast', 3000);
}
function openModal(id){ document.getElementById(id).classList.add('active'); }
function closeModal(id){ document.getElementById(id).classList.remove('active'); }

// --- IMAGE UPLOAD ---
async function uploadImages(e) {
  const files = Array.from(e.target.files);
  toast('Şəkillər yüklənir...');
  for(let f of files) {
    const fd = new FormData();
    fd.append('file', f);
    fd.append('upload_preset', CLOUD_PRESET);
    try {
      const r = await fetch(CLOUD_URL, {method:'POST', body:fd});
      const d = await r.json();
      if(d.secure_url) currentImages.push(d.secure_url);
    } catch(err){ console.error(err); }
  }
  renderPreviews();
}

function renderPreviews() {
  const c = document.getElementById('previewContainer');
  c.innerHTML = currentImages.map((img, i) => `
    <div class="preview-item">
      <img src="${img}">
      <button class="preview-remove" onclick="currentImages.splice(${i},1);renderPreviews();">&times;</button>
    </div>
  `).join('');
}

// --- PRODUCT CRUD ---
async function loadProducts() {
  const {data} = await supa.from('products').select('*').order('created_at', {ascending:false});
  document.getElementById('prodCount').textContent = data.length + ' məhsul tapıldı';
  const table = `<table><thead><tr><th>Şəkil</th><th>Ad</th><th>Növ</th><th>Qiymət</th><th>Status</th><th></th></tr></thead><tbody>` +
    data.map(p => `<tr>
      <td><img src="${p.images?.[0]||''}" class="thumb"></td>
      <td><strong>${p.name?.az || 'Adsız'}</strong></td>
      <td>${p.type}</td>
      <td>${p.price} ₼</td>
      <td>${p.collection_id === 'featured' ? '⭐' : ''} ${p.status}</td>
      <td>
        <button class="btn btn-sm btn-outline" onclick="editProduct('${p.id}')">Düzəliş</button>
        <button class="btn btn-sm btn-danger" onclick="deleteProduct('${p.id}')">Sil</button>
      </td>
    </tr>`).join('') + `</tbody></table>`;
  document.getElementById('productsTable').innerHTML = table;
}

function openProductModal() {
  document.getElementById('editId').value = '';
  document.getElementById('mTitle').textContent = 'Yeni Məhsul';
  document.getElementById('p-name').value = '';
  document.getElementById('p-desc').value = '';
  document.getElementById('p-price').value = '';
  document.getElementById('p-sizes').value = '';
  currentImages = [];
  renderPreviews();
  openModal('productModal');
}

async function editProduct(id) {
  const {data} = await supa.from('products').select('*').eq('id', id).single();
  document.getElementById('editId').value = data.id;
  document.getElementById('mTitle').textContent = 'Məhsulu Yenilə';
  document.getElementById('p-name').value = data.name.az;
  document.getElementById('p-desc').value = data.description.az;
  document.getElementById('p-price').value = data.price;
  document.getElementById('p-type').value = data.type;
  document.getElementById('p-feat').value = data.collection_id === 'featured' ? 'true' : 'false';
  document.getElementById('p-sizes').value = data.sizes?.join(', ') || '';
  currentImages = data.images || [];
  renderPreviews();
  openModal('productModal');
}

async function saveProduct() {
  const id = document.getElementById('editId').value;
  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = 'Saxlanılır...';

  const obj = {
    name: {az: document.getElementById('p-name').value},
    description: {az: document.getElementById('p-desc').value},
    price: parseFloat(document.getElementById('p-price').value) || 0,
    type: document.getElementById('p-type').value,
    collection_id: document.getElementById('p-feat').value === 'true' ? 'featured' : null,
    sizes: document.getElementById('p-sizes').value.split(',').map(s=>s.trim()),
    images: currentImages,
    status: 'active'
  };

  if(id) await supa.from('products').update(obj).eq('id', id);
  else await supa.from('products').insert([obj]);

  btn.disabled = false; btn.textContent = 'Yadda Saxla';
  closeModal('productModal');
  loadProducts();
  toast('Məlumat uğurla qeyd olundu');
}

async function deleteProduct(id) {
  if(confirm('Silmək istədiyinizə əminsiniz?')) {
    await supa.from('products').delete().eq('id', id);
    loadProducts();
  }
}

// --- CMS & SETTINGS ---
async function loadCMS() {
  const {data} = await supa.from('app_settings').select('*').eq('id', 1).single();
  if(data) {
    document.getElementById('inp-hero-title').value = data.hero_title || '';
    document.getElementById('inp-hero-sub').value = data.hero_sub || '';
    document.getElementById('inp-about-title').value = data.about_title || '';
    document.getElementById('inp-about-text').value = data.about_text || '';
    document.getElementById('inp-wa').value = data.whatsapp || '';
    document.getElementById('inp-insta').value = data.instagram || '';
  }
}

async function saveCMS() {
  const obj = {
    hero_title: document.getElementById('inp-hero-title').value,
    hero_sub: document.getElementById('inp-hero-sub').value,
    about_title: document.getElementById('inp-about-title').value,
    about_text: document.getElementById('inp-about-text').value
  };
  await supa.from('app_settings').upsert({id:1, ...obj});
  toast('Sayt məlumatları yeniləndi!');
}

async function saveSettings() {
  const wa = document.getElementById('inp-wa').value.replace(/[^0-9]/g, '');
  const insta = document.getElementById('inp-insta').value;
  const pass = document.getElementById('inp-pass').value;

  if(pass) localStorage.setItem('avera_p', pass);
  await supa.from('app_settings').upsert({id:1, whatsapp: wa, instagram: insta});
  toast('Ayarlar saxlanıldı!');
}

function init() {
  loadProducts();
  loadCMS();
}
</script>
</body>
</html>
